name: Auto Generate Changelog with DeepSeek

permissions:
  contents: write
  pull-requests: read
on:
  workflow_dispatch:
    inputs:
      main_version:
        description: '主版本号(1.X)'
        required: true
        type: string
      sub_version:
        description: '次/完整版本号(1.X.X)'
        required: true
        type: string
      current_tag:
        description: '当前Git Tag名称(v1.X.X，不存在则自动创建)'
        required: true
        type: string

jobs:
  build-changelog:
    runs-on: ubuntu-latest
    steps:

      - name: 检出代码（拉全量历史+所有Tag）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 处理Tag（自动创建不存在的Tag）
        id: process_tag
        run: |
          CURRENT_TAG="${{ github.event.inputs.current_tag }}"
          git fetch --tags origin

          if git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "✅ Tag $CURRENT_TAG 已存在"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "🔍 Tag $CURRENT_TAG 不存在，自动创建"
            git tag "$CURRENT_TAG"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

          ALL_TAGS=$(git tag --sort=v:refname)
          echo "所有Tag列表:"
          echo "$ALL_TAGS"

          PREV_TAG=""
          TAG_ARRAY=($(git tag --sort=v:refname | grep -E "^v?[0-9]+\.[0-9]+\.[0-9]+$"))
          LEN=${#TAG_ARRAY[@]}
          for((i=0;i<LEN;i++));do
            if [[ "${TAG_ARRAY[$i]}" == "$CURRENT_TAG" && $i -gt 0 ]];then
              PREV_TAG=${TAG_ARRAY[$((i-1))]}
              break
            fi
          done

          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT

      - name: 生成Commit差异日志
        id: get_commit_log
        run: |
          PREV_TAG="${{ steps.process_tag.outputs.prev_tag }}"
          CURRENT_TAG="${{ steps.process_tag.outputs.current_tag }}"

          echo "上一个Tag: $PREV_TAG"
          echo "当前Tag: $CURRENT_TAG"

          if [ -n "$PREV_TAG" ] && git rev-parse "$PREV_TAG" >/dev/null 2>&1 && git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "✅ 生成 $PREV_TAG..$CURRENT_TAG 区间Commit日志"
            git log $PREV_TAG..$CURRENT_TAG --pretty="- %s (%h)" > commit_diff.txt
          else
            echo "⚠️ 未找到有效Tag区间，使用最近20条Commit兜底"
            git log -20 --pretty="- %s (%h)" > commit_diff.txt
          fi

      - name: 调用DeepSeek生成Changelog并写入App.md
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_ENDPOINT: ${{ secrets.LLM_API_ENDPOINT || 'https://api.deepseek.com/chat/completions/' }}
          LLM_API_MODEL: ${{ secrets.LLM_API_MODEL || 'deepseek-chat' }}
          MAIN_VERSION: ${{ github.event.inputs.main_version }}
          SUB_VERSION: ${{ github.event.inputs.sub_version }}
          CURRENT_TAG: ${{ steps.process_tag.outputs.current_tag }}
        run: |
          python3 .github/workflows/scripts/gen_changelog.py

      - name: 读取Changelog内容供Release使用
        id: read_changelog
        run: |
          CHANGELOG_PATH="doc/Changelogs/${{ github.event.inputs.main_version }}/${{ github.event.inputs.sub_version }}/App.md"
          if [ -f "$CHANGELOG_PATH" ]; then
            echo "content=$(cat "$CHANGELOG_PATH" | sed 's/\r$//' | awk '{printf "%s\\n", $0}' | sed 's/\\$//')" >> $GITHUB_OUTPUT
            echo "✅ Changelog文件已读取"
          else
            echo "⚠️ Changelog文件不存在: $CHANGELOG_PATH"
          fi

      - name: 提交&推送Changelog文件
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto generate changelog for ${{ steps.process_tag.outputs.current_tag }}" && git push)

      - name: 推送新建的Tag到远端
        if: steps.process_tag.outputs.tag_exists == 'false'
        run: |
          git push origin ${{ steps.process_tag.outputs.current_tag }}
          echo "✅ 已自动推送Tag ${{ steps.process_tag.outputs.current_tag }} 到远端"

      - name: 创建GitHub Release
        if: steps.read_changelog.outputs.content != ''
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.read_changelog.outputs.content }}
          tag_name: ${{ github.event.inputs.current_tag }}
          name: ${{ github.event.inputs.current_tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
